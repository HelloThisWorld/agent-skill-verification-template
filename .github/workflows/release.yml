# Tag-driven release: builds standalone executables on native runners for
# every supported platform, validates the archives and checksums, then
# publishes a GitHub Release draft-first.
#
# Dry run: trigger manually (workflow_dispatch). A dispatch run builds and
# validates everything and uploads workflow artifacts, but NEVER creates a
# tag or a Release (the release job only runs for tag pushes).
name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Least privilege by default; only the `release` job below gets write access.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pinned Node version for reproducible release builds. The Node SEA procedure
  # used by scripts/build-standalone.mjs follows this version's documentation.
  NODE_VERSION: "22.13.1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate tag format and package-version match
        if: github.event_name == 'push'
        run: node scripts/release-check.mjs --tag-only --tag "$GITHUB_REF_NAME"

      - name: Install dependencies (locked)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build portable CLI bundle
        run: npm run build:cli

      - name: Smoke-test the portable CLI
        run: node scripts/smoke-test.mjs --target dist/cli/agent-skill-verifier.cjs

  build-platform:
    needs: verify
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-15-intel
            target: macos-x64
          - os: macos-14
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      - name: Build and package the standalone executable (Node SEA)
        run: node scripts/package-release.mjs --standalone-only

      - name: Validate the archive and manifest
        run: node scripts/release-check.mjs --require-commit-match

      - name: Smoke-test the standalone executable (outside the repository)
        run: node scripts/smoke-test.mjs

      - name: Upload platform archive
        uses: actions/upload-artifact@v4
        with:
          name: asv-${{ matrix.target }}
          path: |
            dist/release/*.zip
            dist/release/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-portable:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      - name: Package the portable Node bundle
        run: node scripts/package-release.mjs --portable-only

      - name: Validate the archive and manifest
        run: node scripts/release-check.mjs --require-commit-match

      - name: Smoke-test the portable bundle (outside the repository)
        run: node scripts/smoke-test.mjs --target dist/cli/agent-skill-verifier.cjs

      - name: Upload portable archive
        uses: actions/upload-artifact@v4
        with:
          name: asv-node
          path: dist/release/*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    # Publication happens ONLY for pushed version tags — never for
    # workflow_dispatch dry runs and never from pull requests.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [verify, build-platform, build-portable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asv-*
          path: dist/release
          merge-multiple: true

      - name: Inspect downloaded assets
        run: ls -l dist/release

      - name: Validate tag, archives, manifests, and expected asset set
        run: >
          node scripts/release-check.mjs
          --tag "$GITHUB_REF_NAME"
          --require-commit-match
          --require-assets windows-x64,linux-x64,macos-x64,macos-arm64,node

      - name: Generate checksums
        run: node scripts/generate-checksums.mjs dist/release

      - name: Verify checksums
        run: node scripts/generate-checksums.mjs dist/release --verify

      - name: Generate release notes
        run: node scripts/release-notes.mjs > dist/release-notes.md

      - name: Ensure the release does not already exist
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $GITHUB_REF_NAME already exists — refusing to overwrite."
            exit 1
          fi

      - name: Create draft release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --title "Agent Skill Verifier v${VERSION}" \
            --notes-file dist/release-notes.md \
            --verify-tag

      - name: Upload assets to the draft (no clobbering)
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            dist/release/*.zip \
            dist/release/*.tar.gz \
            dist/release/SHA256SUMS.txt \
            dist/release/SHA256SUMS.json

      - name: Confirm every expected asset was uploaded
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --json assets --jq '.assets[].name' | sort > uploaded.txt
          ls dist/release | grep -E '\.(zip|tar\.gz)$|^SHA256SUMS' | sort > expected.txt
          echo "Expected:"; cat expected.txt
          echo "Uploaded:"; cat uploaded.txt
          diff expected.txt uploaded.txt

      - name: Publish the release
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false --latest

      - name: Show the published release
        run: gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY"
