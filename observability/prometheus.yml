# Prometheus scrape config (DEMO).
#
# Scrapes the OpenTelemetry Collector's Prometheus endpoint. In the current MVP
# the harness writes a metrics.prom snapshot instead of pushing live metrics;
# to ingest that file directly you would use the Prometheus node_exporter
# "textfile" collector (see ../docs/observability-model.md). Live push through
# the collector is a roadmap item.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
